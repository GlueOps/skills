name: validate skills

# Lints every skills/<name>/SKILL.md against the Agent Skills standard
# (required frontmatter, name matches directory, portable fields only).
# Runs in a container per GlueOps convention (no host toolchain needed).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Validate SKILL.md frontmatter
        run: |
          docker run --rm -v "$PWD":/repo -w /repo python:3-alpine \
            sh -c "pip install --quiet pyyaml && python3 .github/scripts/validate_skills.py"
